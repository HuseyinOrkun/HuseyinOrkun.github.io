- title: Experience
  type: time_table
  contents:
    - title: Researcher at Urgen Lab
      institution: Neuroscience, Bilkent University
      year: Jan. 2019 - Present
      description:
        - title: Effects of Prediction on Biological Motion Perception.
          contents:
            - Contributed to the design of a series of decision making experiments using biological motion and prediction paradigm.
            - Used drift diffusional models and bayesian modelling for analysis of RT data. Implemented scripts for statistical comparisons of different models in Python and R.
            - Designed and implemented a follow up EEG experiment using a similar paradigm. Collected EEG data from more than 30 participants. Trained interns on EEG and behavioral data collection.
            - Proposed and implemented a custom preprocessing pipeline using EEGLAB, MNE-Python and Autoreject.
            - Analyzed EEG data using univariate and multivariate analysis techniques with MNE-Python.
            - Contributed to the writing of progress reports for the funding body.
        - title: Temporal Characteristics of Agent PerceptionTemporal Characteristics of Agent Perception
          contents:
            - Used representational similarity analysis (rsa) and implemented a temporal variant for EEG data using Python and Matlab
            - Used different classification algorithms to decode EEG signal and analyzed patterns of classfication performance.
            - Explored the temporal characteristics of agent perception using rsa and multiple linear regression on raw EEG data. 
            - Contributed to manuscript preparation process.
        - title: Investigation of Processing of Observed Actions using sEEG Data
          contents:
          - Contributed to the analysis of sEEG data from involving 40 patients using classification, regression and decoding with MNE-Python. 
          - Involved in decision making on the choice of the data analysis method.

    - title: Junior Data Scientist
      institution: Databoss Security and Analytics Ankara, Turkey.
      year: July - Nov. 2018
      description:
          - Worked on anomaly and event detection from social media data using Python.
          - Built and experimented with different models that identify irregularities in time-series data.
          - Built and used APIs to communicate with big data team.
          - Worked on graph machine learning algorithms. 
          - Contributed to writing for project milestone documents.

    - title: Undergraduate Volunteer Researcher
      institution: Bilkent University, Ankara
      year: June - Feb. 2017
      description:
          - Took a part in the research of M.S. student Mert Sarıyıldız under the supervision of Gökberk Cinbis.
          - Used Tensorflow on Python to build a zero-shot learning model using TensorFlow.
          - Contributed to Python implementation of an evaluation framework for zero shot learning.
